<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Практика </title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap');

  :root {
    --bg: #0d0f1a;
    --surface: #13162a;
    --surface2: #1a1e35;
    --border: #252a45;
    --accent: #5b7cfc;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #e2e8f0;
    --muted: #8892b0;
    --code-bg: #0a0c18;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    padding: 24px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    padding: 40px 20px;
    background: linear-gradient(135deg, #1a1e35 0%, #0d0f1a 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }

  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 900;
    background: linear-gradient(90deg, #5b7cfc, #a78bfa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    z-index: 1;
  }

  .search-wrap { max-width: 500px; margin: 0 auto 32px; }

  input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    color: var(--text);
    font-family: inherit;
    outline: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }

  .card-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--bg);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    padding: 4px 10px;
    border-radius: 6px;
  }

  .card-body { padding: 16px 18px; }

  .q-block { margin-bottom: 18px; }
  .q-label { font-size: 11px; font-weight: 700; color: var(--accent3); text-transform: uppercase; margin-bottom: 4px; }
  .q-text { color: var(--accent2); font-size: 13px; font-weight: 700; margin-bottom: 8px; }

  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    font-size: 12px;
    color: var(--accent3);
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
  }

  pre:hover { border-color: var(--accent); }
  pre:active { transform: scale(0.98); }

  pre::after {
    content: 'Нажми, чтобы скопировать';
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 9px;
    color: var(--muted);
    opacity: 0.5;
  }

  .divider { height: 1px; background: var(--border); margin: 14px 0; }
</style>
</head>
<body>

<header>
  <h1>🐍 ПРАКТИКА</h1>
  <p>Зевсик По Скрипту Может Выдать 2 Бонуски Подряд</p>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="🔍 Поиск по номеру билета или теме...">
</div>

<div class="grid" id="grid"></div>

<script>
const practice = [
  { n: 1, a: `x = 10\nprint(x + 2)\nprint(x - 2)\nprint(x * 2)`, b: `import tkinter as tk\nroot = tk.Tk()\nroot.title("Билет 1")\nroot.geometry("300x200")\nroot.mainloop()` },
  { n: 2, a: `for i in range(1, 11):\n    print(i)`, b: `import tkinter as tk\nroot = tk.Tk()\ndef click():\n    print("Кнопка нажата!")\nbtn = tk.Button(root, text="Нажми", command=click)\nbtn.pack()\nroot.mainloop()` },
  { n: 3, a: `x = 15\nif x > 10:\n    print("Число больше 10")`, b: `import tkinter as tk\nroot = tk.Tk()\nroot.mainloop()` },
  { n: 4, a: `nums = [1, 2, 3, 4, 5]\nprint(nums)`, b: `import tkinter as tk\nroot = tk.Tk()\nimg = tk.PhotoImage(file="image.png")\nlbl = tk.Label(root, image=img)\nlbl.pack()\nroot.mainloop()` },
  { n: 5, a: `s = "Hello World"\nprint(len(s))`, b: `import tkinter as tk\nroot = tk.Tk()\nvar = tk.IntVar()\ndef show():\n    print(var.get())\ncb = tk.Checkbutton(root, text="Выбор", variable=var, command=show)\ncb.pack()\nroot.mainloop()` },
  { n: 6, a: `a, b = 5, 10\nif a > 0 and b > 0:\n    print("Оба числа положительные")`, b: `import tkinter as tk\nfrom tkinter import ttk\nroot = tk.Tk()\ncombo = ttk.Combobox(root, values=["Раз", "Два", "Три"])\ncombo.pack()\nroot.mainloop()` },
  { n: 7, a: `a, b = 10, 20\nprint(a == b)\nprint(a < b)`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Button(root, text="Кнопка 1").pack()\ntk.Button(root, text="Кнопка 2").pack()\nroot.mainloop()` },
  { n: 8, a: `i = 1\nwhile i <= 5:\n    print(i)\n    i += 1`, b: `import tkinter as tk\nroot = tk.Tk()\nsc = tk.Scale(root, from_=0, to=100, orient="horizontal")\nsc.pack()\nroot.mainloop()` },
  { n: 9, a: `lst = [1, 2]\nlst.append(3)\nprint(lst)`, b: `import tkinter as tk\nroot = tk.Tk()\ndef open_win():\n    tk.Toplevel(root)\ntk.Button(root, text="Открыть", command=open_win).pack()\nroot.mainloop()` },
  { n: 10, a: `lst = [1, 2, 3]\nlst.pop()\nprint(lst)`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Button(root, text="Закрыть", command=root.destroy).pack()\nroot.mainloop()` },
  { n: 11, a: `lst = ["a", "b", "c"]\nprint(lst[1])`, b: `import tkinter as tk\nroot = tk.Tk()\nimg = tk.PhotoImage(file="pic.png")\ntk.Label(root, image=img).pack()\nroot.mainloop()` },
  { n: 12, a: `lst = [1, 2, 3]\nlst.remove(2)\nprint(lst)`, b: `# Если не сохранить в self.img, сборщик мусора удалит объект\nimport tkinter as tk\nroot = tk.Tk()\nimg = tk.PhotoImage(file="1.png")\ntk.Label(root, image=img).pack()\n# Изображение может не появиться без ссылки\nroot.mainloop()` },
  { n: 13, a: `def say_hi():\n    print("Привет!")\nsay_hi()`, b: `import tkinter as tk\nroot = tk.Tk()\nlbl = tk.Label(root, text="Просто текст")\nlbl.pack()\nroot.mainloop()` },
  { n: 14, a: `def sq(n):\n    return n**2\nprint(sq(5))`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Label(root, text="1").grid(row=0, column=0)\ntk.Label(root, text="2").grid(row=0, column=1)\nroot.mainloop()` },
  { n: 15, a: `lst = [10, 50, 20]\nprint(max(lst))`, b: `import tkinter as tk\nroot = tk.Tk()\ndef tick():\n    print("Прошла секунда")\nroot.after(1000, tick)\nroot.mainloop()` },
  { n: 16, a: `i = 0\nwhile i < 10:\n    print(i)\n    i += 1`, b: `# Устный ответ: while True блокирует mainloop()\n# Окно перестанет реагировать на нажатия.` },
  { n: 17, a: `n = 4\nif n % 2 == 0:\n    print("Четное")`, b: `import tkinter as tk\nroot = tk.Tk()\nc = 0\ndef count():\n    global c; c += 1; print(c)\n    root.after(1000, count)\ncount()\nroot.mainloop()` },
  { n: 18, a: `lst = [3, 1, 2]\nlst.sort()\nprint(lst)`, b: `import tkinter as tk\nroot = tk.Tk()\nimg = tk.PhotoImage(file="i.png")\ntk.Button(root, image=img).pack()\nroot.mainloop()` },
  { n: 19, a: `x = 5\nif x < 0 or x > 0:\n    print("Не ноль")`, b: `import tkinter as tk\nroot = tk.Tk()\ndef cmd(): print("Ok")\ntk.Button(root, text="Клик", command=cmd).pack()\nroot.mainloop()` },
  { n: 20, a: `c = 0\nc += 1\nprint(c)`, b: `import tkinter as tk\nroot = tk.Tk()\ndef op(): tk.Toplevel(root)\ntk.Button(root, text="Окно", command=op).pack()\nroot.mainloop()` },
  { n: 21, a: `x = -5\nif x < 0:\n    print("Отрицательное")`, b: `import tkinter as tk\nroot = tk.Tk()\ns = tk.Scale(root, from_=0, to=10)\ns.pack()\ndef get_val(): print(s.get())\ntk.Button(root, text="Значение", command=get_val).pack()\nroot.mainloop()` },
  { n: 22, a: `lst = []\nlst.extend([1, 2, 3])\nprint(lst)`, b: `import tkinter as tk\nroot = tk.Tk()\nimg = tk.PhotoImage(file="1.png")\ntk.Label(root, image=img).pack()\nroot.mainloop()` },
  { n: 23, a: `# remove(значение), pop(индекс)\nl = [10, 20]\nl.remove(10) # осталось [20]\nl.pop(0) # список пуст`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Button(root, text="Exit", command=root.destroy).pack()\nroot.mainloop()` },
  { n: 24, a: `def get_len(s):\n    return len(s)\nprint(get_len("abc"))`, b: `import tkinter as tk\nroot = tk.Tk()\ndef t(): print("!"); root.after(1000, t)\nt()\nroot.mainloop()` },
  { n: 25, a: `if 5 >= 3:\n    print("Да")`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Button(root, text="Закрыть", command=root.destroy).pack()\nroot.mainloop()` },
  { n: 26, a: `s = "  text  "\nprint(s.strip())`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Scale(root, from_=0, to=10).pack()\nroot.mainloop()` },
  { n: 27, a: `i = 0\nwhile i < 3:\n    print("ok")\n    i += 1`, b: `import tkinter as tk\nroot = tk.Tk()\ndef go(): root.after(500, go)\ngo()\nroot.mainloop()` },
  { n: 28, a: `s = "python"\nif "p" in s:\n    print("Есть")`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Button(root, text="Кнопка").pack()\nroot.mainloop()` },
  { n: 29, a: `l = [1, 2, 3]\nprint(len(l))`, b: `import tkinter as tk\nroot = tk.Tk()\ndef auto(): print("Клик!"); root.after(1000, auto)\nauto()\nroot.mainloop()` },
  { n: 30, a: `while True:\n    break # пример с условием`, b: `import tkinter as tk\nroot = tk.Tk()\ntk.Label(root, text="Метка").pack()\ntk.Button(root, text="Кнопка").pack()\nroot.mainloop()` }
];

function copyCode(e) {
  const code = e.innerText;
  navigator.clipboard.writeText(code);
  const original = e.innerText;
  e.innerText = "Скопировано! 👍";
  e.style.color = "var(--accent3)";
  setTimeout(() => {
    e.innerText = original;
    e.style.color = "";
  }, 1000);
}

function render() {
  const grid = document.getElementById('grid');
  const search = document.getElementById('search').value.toLowerCase();
  grid.innerHTML = '';
  
  practice.forEach(t => {
    if (search && !t.n.toString().includes(search)) return;
    
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">Билет ${t.n}</span>
      </div>
      <div class="card-body">
        <div class="q-block">
          <div class="q-label">Практика А (Python)</div>
          <pre onclick="copyCode(this)">${t.a}</pre>
        </div>
        <div class="divider"></div>
        <div class="q-block">
          <div class="q-label">Практика В (Tkinter)</div>
          <pre onclick="copyCode(this)">${t.b}</pre>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

document.getElementById('search').addEventListener('input', render);
render();
</script>
</body>
</html>
